<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor Dell de 27 | TechStore</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <a href="index.html" class="logo">Tech<span>Store</span></a>
        <div class="cart-icon">🛒 <span class="cart-count">3</span></div>
    </header>

    <nav class="navigation-bar">
        <a href="index.html" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            <span>Explorar Catálogo</span>
        </a>
    </nav>

    <main class="product-detail-container">
        <section class="gallery-section">
            <div class="thumbnails">
                <img src="imagens/monitor/monitor2.avif" class="thumb" alt="Vista Frontal Aberto">
                <img src="imagens/monitor/monitor3.avif" class="thumb" alt="Teclado RGB">
                <img src="imagens/monitor/monitor4.avif" class="thumb" alt="Entradas Laterais">
            </div>
            <div class="main-photo">
                <img src="imagens/monitor/monitor.avif" id="main-img" alt="Notebook Gamer Nitro">
            </div>
        </section>

        <section class="info-section">
            <nav class="breadcrumb">Home > Monitor > Gamer</nav>
            <h1>Monitor Dell de 27</h1>
            <p class="description">
                Um monitor FHD de 27" que otimiza o conforto visual e combina imagens incríveis
                 a uma acústica impressionante em um design inspirado no estilo de vida atual.
            </p>
            <div class="price-tag">R$ 5.800,00</div>
            <button class="buy-now-btn">Finalizar Compra</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
