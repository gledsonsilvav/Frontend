<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Samsung Galaxy Watch7 Smartwatch 44mm</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <a href="index.html" class="logo">Tech<span>Store</span></a>
        <div class="cart-icon">🛒 <span class="cart-count">3</span></div>
    </header>

    <nav class="navigation-bar">
        <a href="index.html" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            <span>Explorar Catálogo</span>
        </a>
    </nav>

    <main class="product-detail-container">
        <section class="gallery-section">
            <div class="thumbnails">
                <img src="imagens/smartwatch/smartwatch2.jpg" class="thumb" alt="Vista Frontal Aberto">
                <img src="imagens/smartwatch/smartwatch3.jpg" class="thumb" alt="Teclado RGB">
                <img src="imagens/smartwatch/smartwatch4.jpg" class="thumb" alt="Entradas Laterais">

                <img src="imagens/smartwatch/smartwatch.jpg" id="main-img" alt="Notebook Gamer Nitro">

        <section class="info-section">
            <nav class="breadcrumb">Home > Smartwatch</nav>
            <h1>Samsung Galaxy Watch7 Smartwatch 44mm</h1>
            <p class="description">
                Bluetooth, Galaxy AI, Tela em Cristal de Safira,

            </p>
            <div class="price-tag">R$ 1.079,00</div>
            <button class="buy-now-btn">Finalizar Compra</button>
        </section>

    <script src="script.js"></script>
